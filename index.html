<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinhomes West Point - Mô hình 3D (ArcGIS)</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div id="viewDiv"></div>

    <!-- La bàn lớn ở góc dưới-phải, có thể click để quay về hướng Bắc -->
    <div id="northArrow" title="Click để quay về hướng Bắc">
        <div class="compass-inner">
            <span class="compass-letter north">N</span>
            <span class="compass-letter east">E</span>
            <span class="compass-letter south">S</span>
            <span class="compass-letter west">W</span>
            <div class="compass-needle"></div>
        </div>
    </div>

    <!-- Banner tiêu đề -->
    <div id="titleBar">
        <span class="title">Vinhomes West Point</span>
        <span class="subtitle">Phạm Hùng, Mễ Trì, Nam Từ Liêm, Hà Nội</span>
    </div>

    <script src="https://js.arcgis.com/4.30/"></script>
    <script src="./js/buildings.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
